<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - EventBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Reset Password</h2>
                        <p class="text-center text-muted">Default passwords are simple. Try these:</p>
                        
                        <div class="alert alert-info">
                            <h5><strong>Test Accounts:</strong></h5>
                            <ul class="mb-0">
                                <li><strong>test@test.com</strong> / <code>123456</code></li>
                                <li><strong>customer@test.com</strong> / <code>123456</code></li>
                                <li><strong>organizer@test.com</strong> / <code>123456</code></li>
                            </ul>
                        </div>
                        
                        <div class="text-center">
                            <a href="/login" class="btn btn-primary">Back to Login</a>
                            <a href="/signup" class="btn btn-secondary">Create New Account</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
