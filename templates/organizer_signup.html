<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #fdf2f8 50%, #e0e7ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { max-width: 500px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 30px; padding: 60px 40px; box-shadow: 0 30px 60px rgba(139, 92, 246, 0.3); text-align: center; }
        .title { font-size: 36px; font-weight: 700; margin-bottom: 40px; background: linear-gradient(135deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        input { width: 100%; padding: 20px; font-size: 20px; border-radius: 16px; border: none; background: rgba(255, 255, 255, 0.8); color: #4c1d95; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.1); }
        button { width: 100%; padding: 20px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; font-size: 22px; border: none; border-radius: 16px; cursor: pointer; transition: 0.4s; box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4); }
        button:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(139, 92, 246, 0.5); }
        a { color: #a78bfa; text-decoration: none; display: block; margin-top: 30px; font-size: 18px; transition: 0.3s; }
        a:hover { color: #7c3aed; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Organizer Signup</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div style="background:#ef4444;padding:15px;border-radius:16px;margin-bottom:20px;text-align:center;">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <a href="/organizer/login">Already have an account? Login</a>
        <a href="/customer/signup">Customer Signup</a>
    </div>
</body>
</html>
