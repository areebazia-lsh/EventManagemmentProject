{% extends "base.html" %}
{% block title %}Edit Event{% endblock %}
{% block content %}
<h2 class="text-white mb-4">✏️ Edit Event</h2>

{% if event %}
<form method="POST" class="bg-dark p-4 rounded shadow-lg">
    <div class="mb-3">
        <label class="form-label text-white">Event Name</label>
        <input type="text" name="name" class="form-control" value="{{ event[1] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label text-white">Date</label>
        <input type="date" name="date" class="form-control" value="{{ event[2] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label text-white">Time</label>
        <input type="time" name="time" class="form-control" value="{{ event[3] or '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label text-white">Price (Rs)</label>
        <input type="number" step="1" name="price" class="form-control" value="{{ event[4] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label text-white">Total Seats</label>
        <input type="number" name="seats" class="form-control" value="{{ event[6] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label text-white">Venue</label>
        <select name="venue" class="form-select" required>
            {% for v in venues %}
            <option value="{{ v[0] }}" {% if v[0] == event[5] %}selected{% endif %}>
                {{ v[1] }} ({{ v[2] }})
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary">Save Changes</button>
        <a href="/organizer/dashboard" class="btn btn-outline-light">Cancel</a>
    </div>
</form>
{% else %}
<div class="alert alert-danger">Event not found.</div>
<a href="/organizer/dashboard" class="btn btn-outline-light">← Back to Dashboard</a>
{% endif %}
{% endblock %}
