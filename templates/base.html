<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}EventBook{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">
<style>
    :root {
        --bg-gradient: radial-gradient(circle at top left, #4c1d95, #020617 55%);
        --glass-bg: rgba(15, 23, 42, 0.75);
        --glass-border: rgba(148, 163, 184, 0.35);
        --primary: #6366f1;
        --primary-soft: rgba(99, 102, 241, 0.25);
        --accent: #a855f7;
        --danger: #ef4444;
        --success: #22c55e;
    }

    body {
        min-height: 100vh;
        background: var(--bg-gradient);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .glass {
        background: var(--glass-bg);
        border-radius: 1.5rem;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
            0 18px 55px rgba(15, 23, 42, 0.8),
            0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    .glass-light {
        background: radial-gradient(circle at top left,
                    rgba(148, 163, 184, 0.16),
                    rgba(15, 23, 42, 0.96));
        border-radius: 1.25rem;
        border: 1px solid rgba(148, 163, 184, 0.4);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        box-shadow:
            0 14px 45px rgba(15, 23, 42, 0.9),
            0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    .navbar {
        border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        background: linear-gradient(
            to right,
            rgba(15, 23, 42, 0.98),
            rgba(15, 23, 42, 0.85)
        );
    }

    .btn-primary {
        background: linear-gradient(90deg, #6366f1, #a855f7);
        border: none;
        box-shadow: 0 8px 25px rgba(129, 140, 248, 0.5);
    }
    .btn-primary:hover {
        box-shadow: 0 10px 30px rgba(129, 140, 248, 0.9);
        transform: translateY(-1px);
    }

    /* Global inputs – har page pe text clearly visible */
    .form-control,
    .form-select {
        border-radius: 0.85rem;
        border: 1px solid rgba(148, 163, 184, 0.7);
        padding-top: 0.6rem;
        padding-bottom: 0.6rem;
        background-color: rgba(255, 255, 255, 0.92);
        color: #111827;
    }
    .form-control::placeholder,
    .form-select::placeholder {
        color: rgba(107, 114, 128, 0.8);
    }
    .form-control:focus,
    .form-select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 0.16rem rgba(79, 70, 229, 0.35);
        background-color: #ffffff;
        color: #111827;
    }


    /* Tables: dark header, light rows, dark text */
.table {
    background-color: #f9fafb;      /* light row background */
    color: #111827;                 /* dark text */
}
.table thead {
    background: rgba(15, 23, 42, 0.98);
    color: #f9fafb;
}
.table-striped > tbody > tr:nth-of-type(odd) {
    --bs-table-bg-type: #eef2ff;
}
.table-striped > tbody > tr:nth-of-type(even) {
    --bs-table-bg-type: #e5e7eb;
}

    
    /* Home hero card – premium look without changing colors */
    .home-card {
        margin-top: 80px;
        border-radius: 1.8rem !important;
        border: 1px solid rgba(148, 163, 184, 0.4);
        box-shadow:
            0 26px 80px rgba(15, 23, 42, 0.90),
            0 0 0 1px rgba(148, 163, 184, 0.55);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
    }

    .home-card:hover {
        transform: translateY(-6px);
        box-shadow:
            0 32px 100px rgba(15, 23, 42, 1),
            0 0 0 1px rgba(129, 140, 248, 0.7);
    }

    /* Home buttons – same colours, better hover */
    .home-btn-primary {
        box-shadow: 0 12px 30px rgba(79, 70, 229, 0.55);
    }
    .home-btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 40px rgba(79, 70, 229, 0.85);
    }

    .home-btn-outline {
        border-color: #4f46e5 !important;
        color: #4f46e5 !important;
    }
    .home-btn-outline:hover {
        background-color: rgba(79, 70, 229, 0.06);
        box-shadow: 0 10px 28px rgba(79, 70, 229, 0.4);
    }
</style>


    {% block extra_head %}{% endblock %}
</head>
<body>

{% if show_navbar %}
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">EventBook</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/customer/dashboard">Customer</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/organizer/dashboard">Organizer</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <a class="nav-link position-relative" href="/notifications">
                        <span class="me-1">Notifications</span>
                        <span class="badge bg-danger rounded-pill small">10</span>
                    </a>
                </li>
                <li class="nav-item me-3">
                    <span class="nav-link">Hi, {{ session.get('name','user') }}</span>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
{% endif %}

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
