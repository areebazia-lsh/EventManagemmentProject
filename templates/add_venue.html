{% extends "base.html" %}
{% block title %}Add Venue{% endblock %}
{% block content %}
<h2 class="text-white">🏢 Add New Venue</h2>
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <form method="POST" class="card p-4 shadow-lg">
            <div class="mb-3">
                <label>Venue Name</label>
                <input type="text" name="venue_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Address</label>
                <input type="text" name="address" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>City</label>
                <input type="text" name="city" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Capacity</label>
                <input type="number" name="capacity" class="form-control" required>
            </div>
            <button class="btn btn-success w-100">Add Venue</button>
            <a href="/organizer/dashboard" class="btn btn-outline-secondary w-100 mt-2">← Back</a>
        </form>
        
        {% if venues %}
        <h5 class="mt-5 text-white">Recent Venues:</h5>
        <div class="table-responsive">
            <table class="table table-striped bg-white">
                <thead><tr><th>Name</th><th>City</th><th>Capacity</th></tr></thead>
                <tbody>
                    {% for v in venues %}
                    <tr><td>{{ v[1] }}</td><td>{{ v[2] }}</td><td>{{ v[3] }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
